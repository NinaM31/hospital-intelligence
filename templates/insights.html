{% extends "base.html" %}

{% block content %}

<section class="card">
    <h1>Stored GPT-4o mini Insights</h1>
    {% if saved_insights %}
        {% for insight in saved_insights %}
            <div>
                <h4>{{ insight.analysis_title }}</h4>
                <small>{{ insight.created_at }}</small>
                <div class="markdown-output saved-gpt-output">{{ insight.gpt_output }}</div>
            </div>
        {% endfor %}
    {% else %}
        <p>No saved insights yet.</p>
    {% endif %}
</section>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
document.querySelectorAll(".saved-gpt-output").forEach(div => {
    const rawMarkdown = div.textContent;
    div.innerHTML = marked.parse(rawMarkdown);
});
</script>
{% endblock %}
